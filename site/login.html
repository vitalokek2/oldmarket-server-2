<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — AltMart</title>
<link rel="stylesheet" href="/site/style.css">
<style>
.auth-wrap { max-width: 360px; margin: 40px auto; background: #fff; border-radius: 6px; padding: 24px; }
.auth-wrap h2 { margin-top: 0; text-align: center; }
.auth-tabs { margin-bottom: 16px; border-radius: 4px; border: 1px solid #ccc; overflow: hidden; }
.auth-tabs button { float: left; width: 50%; padding: 10px; border: none; background: #eee; cursor: pointer; font-weight: bold; }
.auth-tabs button.active { background: #94ab3a; color: #fff; }
.auth-form label { display: block; margin-bottom: 10px; }
.auth-form input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
.auth-form button[type="submit"] { background: #94ab3a; color: #fff; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; }
.auth-message { font-size: 13px; text-align: center; }
.auth-message.error { color: #c0392b; }
.auth-message.success { color: #2e7d32; }
</style>
</head>
<body>
<header class="topnav">
  <div class="topnav-inner">
    <a href="/" class="back-link">←</a>
    <a href="/" class="logo">
      <span class="logo-mark">A</span>
      AltMart
    </a>
    <span class="nav-links"></span>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-tabs" id="authTabs">
    <button id="tabLogin" class="active">Вход</button>
    <button id="tabRegister">Регистрация</button>
  </div>

  <form id="authForm" onsubmit="return handleAuth(this)">
    <label>Логин<br><input type="text" name="username" placeholder="Логин" required></label>
    <label>Пароль<br><input type="password" name="password" placeholder="Пароль" required></label>
    <button type="submit" id="submitBtn">Войти</button>
    <div class="auth-message" id="authMessage"></div>
  </form>
</div>

<script>
function $(id) { return document.getElementById(id); }

var tabLogin = $('tabLogin');
var tabRegister = $('tabRegister');
var submitBtn = $('submitBtn');
var form = $('authForm');
var messageEl = $('authMessage');
var mode = 'login';

function setMode(newMode) {
  mode = newMode;
  tabLogin.className = mode === 'login' ? 'active' : '';
  tabRegister.className = mode === 'register' ? 'active' : '';
  submitBtn.textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт';
  messageEl.textContent = '';
}

function handleAuth(form) {
  var username = form.username.value;
  var password = form.password.value;
  var endpoint = mode === 'login' ? '/api/login' : '/api/register';

  messageEl.textContent = '';
  messageEl.className = 'auth-message';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', endpoint, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data.success) {
            if (mode === 'login') {
              window.location.href = '/';
            } else {
              messageEl.textContent = 'Аккаунт создан! Теперь войдите.';
              messageEl.className = 'auth-message success';
              setMode('login');
            }
          } else {
            messageEl.textContent = data.message || 'Ошибка';
            messageEl.className = 'auth-message error';
          }
        } catch (e) {
          messageEl.textContent = 'Ошибка сервера';
          messageEl.className = 'auth-message error';
        }
      } else {
        try {
          var data = JSON.parse(xhr.responseText);
          messageEl.textContent = data.message || 'Ошибка ' + xhr.status;
        } catch (e) {
          messageEl.textContent = 'Ошибка ' + xhr.status;
        }
        messageEl.className = 'auth-message error';
      }
    }
  };
  xhr.send(JSON.stringify({ username: username, password: password }));
  return false;
}

(function() {
  tabLogin.onclick = function() { setMode('login'); };
  tabRegister.onclick = function() { setMode('register'); };
})();
</script>
</body>
</html>
