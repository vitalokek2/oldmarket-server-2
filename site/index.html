<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AltMart</title>
  <link rel="stylesheet" href="/site/style.css">
</head>
<body>
  <header class="topnav">
    <div class="topnav-inner">
      <a href="/" class="logo">
        <span class="logo-mark">A</span>
        AltMart
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="/submit">Загрузить приложение</a>
        <span id="userArea"></span>
      </nav>
    </div>
  </header>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Поиск приложений и игр">
  </div>

  <div class="category-bar" id="categoryBar">
    <span class="category-chip active" data-cat="">Все</span>
    <span class="category-chip" data-game="0">Приложения</span>
    <span class="category-chip" data-game="1">Игры</span>
  </div>

  <main>
    <div class="section-title" id="sectionTitle">Каталог</div>
    <div class="app-grid" id="appGrid">
      <div class="empty-state">Загрузка...</div>
    </div>
  </main>

  <div class="footer">AltMart — неофициальный форк в память об OldMarket</div>

  <script>
    var grid = document.getElementById('appGrid');
    var sectionTitle = document.getElementById('sectionTitle');
    var searchInput = document.getElementById('searchInput');
    var categoryBar = document.getElementById('categoryBar');

    var currentGameFilter = null;
    var searchTimer = null;

    function renderApps(apps) {
      if (!apps.length) {
        grid.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
        return;
      }
      var html = '<table><tr>';
      for (var i = 0; i < apps.length; i++) {
        if (i > 0 && i % 2 === 0) html += '</tr><tr>';
        html += '<td>' + appCardHtml(apps[i]) + '</td>';
      }
      html += '</tr></table>';
      grid.innerHTML = html;
    }

    function appCardHtml(app) {
      var icon = app.icon ? '/html/apps/' + app.icon : '/site/default-icon.svg';
      var rating = app.rating ? '<span class="stars">* ' + app.rating.toFixed(1) + '</span>' : '';
      return '<a class="app-card" href="/app.html?id=' + app.id + '">'
        + '<span class="app-icon-wrap"><img class="icon" src="' + icon + '" alt="" onerror="this.src=\'/site/default-icon.svg\'"></span>'
        + '<div class="app-meta">'
        + '<span class="app-title">' + escapeHtml(app.name || 'Без названия') + '</span>'
        + '<span class="app-sub">' + escapeHtml(app.category_label || '') + '</span>'
        + rating
        + '</div></a>';
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function loadApps() {
      var qs = '';
      if (currentGameFilter !== null) qs = '?is_game=' + currentGameFilter;
      sectionTitle.textContent = currentGameFilter === '1' ? 'Игры' : currentGameFilter === '0' ? 'Приложения' : 'Каталог';
      grid.innerHTML = '<div class="empty-state">Загрузка...</div>';
      ajaxGet('/api/apps' + qs, function(apps) {
        renderApps(apps);
      }, function() {
        grid.innerHTML = '<div class="empty-state">Не удалось загрузить каталог</div>';
      });
    }

    function doSearch(q) {
      if (!q) { loadApps(); return; }
      var qs = '?q=' + encodeURIComponent(q);
      if (currentGameFilter !== null) qs += '&is_game=' + currentGameFilter;
      sectionTitle.textContent = 'Результаты по запросу "' + q + '"';
      grid.innerHTML = '<div class="empty-state">Поиск...</div>';
      ajaxGet('/api/apps/search' + qs, function(apps) {
        renderApps(apps);
      }, function() {
        grid.innerHTML = '<div class="empty-state">Ошибка поиска</div>';
      });
    }

    function ajaxGet(url, onSuccess, onError) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try { onSuccess(JSON.parse(xhr.responseText)); }
            catch (e) { if (onError) onError(); }
          } else {
            if (onError) onError();
          }
        }
      };
      xhr.send();
    }

    function onSearchInput() {
      clearTimeout(searchTimer);
      var q = searchInput.value;
      searchTimer = setTimeout(function() { doSearch(q); }, 250);
    }
    if (searchInput.addEventListener) {
      searchInput.addEventListener('input', onSearchInput);
    } else {
      searchInput.oninput = onSearchInput;
    }

    function onCategoryClick(e) {
      var target = e.target || e.srcElement;
      if (target.className.indexOf('category-chip') === -1) return;
      var chips = categoryBar.getElementsByClassName ? categoryBar.getElementsByClassName('category-chip') : categoryBar.children;
      for (var i = 0; i < chips.length; i++) {
        chips[i].className = chips[i].className.replace(/\bactive\b/g, '');
      }
      target.className = target.className + ' active';
      currentGameFilter = target.getAttribute('data-game') !== null ? target.getAttribute('data-game') : null;
      var q = searchInput.value;
      q ? doSearch(q) : loadApps();
    }
    if (categoryBar.addEventListener) {
      categoryBar.addEventListener('click', onCategoryClick);
    } else {
      categoryBar.onclick = onCategoryClick;
    }

    function renderUserArea() {
      var userArea = document.getElementById('userArea');
      ajaxGet('/api/me', function(me) {
        userArea.innerHTML = '<a href="/profile.html">' + escapeHtml(me.username) + '</a>';
      }, function() {
        userArea.innerHTML = '<a href="/login.html">Войти</a>';
      });
    }
    renderUserArea();

    loadApps();
  </script>
</body>
</html>
