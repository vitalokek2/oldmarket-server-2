# ─── nginx → FastAPI (порт 80 → 5000)
#
# Установка: https://nginx.org/ru/download.html
# Запуск: nginx -c /полный/путь/до/nginx.conf
#
# server_name _ — работает на любом домене/IP

server {
    listen 80;
    server_name _;
    charset utf-8;

    # ── Смените на свой путь до папки html/ ──
    set $site_root /путь/до/проекта/html;

    # Статика напрямую (быстрее чем через Python)
    location /html/ {
        alias $site_root/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Всё остальное — на FastAPI (:5000)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
