<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ config.name }} — Админка</title>
<style>
body{background:#1a1a2e;color:#eee;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
form{background:#16213e;padding:2rem;border-radius:8px;width:300px}
input{width:100%;padding:.6rem;margin:.5rem 0;border:1px solid #444;border-radius:4px;background:#0f3460;color:#eee;font-size:1rem}
button{width:100%;padding:.7rem;background:#e94560;color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer}
button:hover{background:#d63850}
.error{color:#e94560;margin-bottom:1rem;text-align:center}
h1{text-align:center;font-size:1.3rem;margin:0 0 1.5rem}
</style>
</head>
<body>
<form method="post" action="/admin/">
<h1>{{ config.name }} — вход</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<input type="password" name="password" placeholder="Пароль" required autofocus>
<button type="submit">Войти</button>
</form>
</body>
</html>
